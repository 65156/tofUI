name: Release to PyPI

# Publishes on a version tag (v1.4.4). Run manually with `dry_run` to build and
# check the artifacts without publishing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate only; do not publish"
        type: boolean
        default: true

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(python -c 'import tofui; print(tofui.__version__)')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME implies $TAG_VERSION but tofui.__version__ is $PKG_VERSION"
            exit 1
          fi
          echo "Version $PKG_VERSION matches tag $GITHUB_REF_NAME"

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate metadata
        run: python -m twine check dist/*

      - name: Smoke test the wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/*.whl
          /tmp/smoke/bin/tofui --version

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
    environment:
      name: pypi
      url: https://pypi.org/p/tofui
    permissions:
      id-token: write # required for Trusted Publishing; no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
